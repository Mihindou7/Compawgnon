name: CI

on:
  push:
    branches: [develope]
  pull_request:
    branches: [develope, master]

jobs:
  # ─────────────────────────────────────────────
  # Job 1 : Frontend — lint, types, tests
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lint ESLint
        run: npm run lint

      - name: Vérification TypeScript
        run: npx tsc --noEmit

      - name: Tests unitaires (Vitest)
        run: npm test

  # ─────────────────────────────────────────────
  # Job 2 : Backend — Tests unitaires (sans services)
  # ─────────────────────────────────────────────
  backend-unit:
    name: Backend — Tests unitaires
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, intl, zip, opcache, apcu
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Installer les dépendances Composer
        run: composer install --no-interaction --prefer-dist --no-scripts --optimize-autoloader

      - name: Créer le fichier .env minimal
        run: |
          printf 'APP_ENV=test\nAPP_SECRET=ci_secret_for_tests\nDATABASE_URL=sqlite:///:memory:\nMAILER_DSN=null://null\nDEFAULT_URI=http://localhost\nFRONTEND_URL=http://localhost:3000\nMAILER_FROM_ADDRESS=noreply@compawgnon.test\nMAILER_FROM_NAME=Compawgnon\nMONGODB_URL=mongodb://127.0.0.1:27017\nMONGODB_DB=compawgnon_test\n' > .env
          printf 'JWT_SECRET_KEY=%%kernel.project_dir%%/config/jwt/private.pem\nJWT_PUBLIC_KEY=%%kernel.project_dir%%/config/jwt/public.pem\nJWT_PASSPHRASE=ci_jwt_passphrase\nJWT_TTL=3600\nJWT_REFRESH_TOKEN_TTL=2592000\n' >> .env

      - name: Tests unitaires (PHPUnit)
        run: vendor/bin/phpunit --configuration phpunit.dist.xml --testsuite Unit
        env:
          APP_ENV: test

  # ─────────────────────────────────────────────
  # Job 3 : Backend — Tests d'intégration (MySQL + MongoDB)
  # ─────────────────────────────────────────────
  backend-integration:
    name: Backend — Tests d'intégration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      JWT_PASSPHRASE: ci_jwt_passphrase
      DATABASE_URL: "mysql://compawgnon:secret@127.0.0.1:3306/compawgnon?serverVersion=8.4&charset=utf8mb4"
      MONGODB_URL: "mongodb://127.0.0.1:27017"
      MONGODB_DB: compawgnon_test

    services:
      database:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: compawgnon_test
          MYSQL_USER: compawgnon
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, intl, zip, opcache, apcu, mongodb
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Installer les dépendances Composer
        run: composer install --no-interaction --prefer-dist --no-scripts --optimize-autoloader

      - name: Créer le fichier .env minimal
        run: |
          printf 'APP_ENV=test\nAPP_SECRET=ci_secret_for_tests\nMAILER_DSN=null://null\nDEFAULT_URI=http://localhost\nFRONTEND_URL=http://localhost:3000\nMAILER_FROM_ADDRESS=noreply@compawgnon.test\nMAILER_FROM_NAME=Compawgnon\nMONGODB_DB=compawgnon_test\n' > .env
          printf 'DATABASE_URL=%s\nMONGODB_URL=%s\n' "$DATABASE_URL" "$MONGODB_URL" >> .env
          printf 'JWT_SECRET_KEY=%%kernel.project_dir%%/config/jwt/private.pem\nJWT_PUBLIC_KEY=%%kernel.project_dir%%/config/jwt/public.pem\nJWT_PASSPHRASE=ci_jwt_passphrase\nJWT_TTL=3600\nJWT_REFRESH_TOKEN_TTL=2592000\n' >> .env

      - name: Générer la paire de clés JWT
        run: php bin/console lexik:jwt:generate-keypair --overwrite --env=test

      - name: Lancer les migrations Doctrine
        run: php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Tests d'intégration (PHPUnit)
        run: vendor/bin/phpunit --configuration phpunit.dist.xml --testsuite Integration
