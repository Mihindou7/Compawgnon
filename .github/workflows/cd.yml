name: CD Compawgnon

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

# Un seul déploiement à la fois
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ─── Job 1 : construire et publier les images Docker ───────────────────────
  build-and-push:
    name: Build & Push images GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Préparer les tags
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build et push image backend (FrankenPHP)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          target: frankenphp_prod
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/backend:latest
            ghcr.io/${{ steps.meta.outputs.repo }}/backend:${{ steps.meta.outputs.sha }}

      - name: Build et push image frontend (Next.js)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            BACKEND_INTERNAL_URL=http://php
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/frontend:latest
            ghcr.io/${{ steps.meta.outputs.repo }}/frontend:${{ steps.meta.outputs.sha }}

  # ─── Job 2 : déploiement sur le serveur Hetzner ────────────────────────────
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/compawgnon

            echo ">>> Pull du code..."
            git pull origin master

            echo ">>> Rebuild et redémarrage des conteneurs..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo ">>> Nettoyage des images obsolètes..."
            docker image prune -f

            echo ">>> Déploiement terminé."
