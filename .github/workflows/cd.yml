name: CD Compawgnon

on:
  pull_request:
    branches: [develope, master]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

# Un seul déploiement à la fois
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ─── Job 1 : construire et publier les images Docker ───────────────────────
  build-and-push:
    name: Build & Push images GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.pull_request.head.sha }}

      - name: Login GHCR
        if: ${{ github.event_name == 'workflow_run' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Préparer les tags
        id: meta
        env:
          HEAD_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.pull_request.head.sha }}
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "sha=${HEAD_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build et push image backend (FrankenPHP)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: frankenphp_prod
          push: ${{ github.event_name == 'workflow_run' }}
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/backend:latest
            ghcr.io/${{ steps.meta.outputs.repo }}/backend:${{ steps.meta.outputs.sha }}

      - name: Build et push image frontend (Next.js)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'workflow_run' }}
          provenance: false
          sbom: false
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID || 'test-google-client-id' }}
            BACKEND_INTERNAL_URL=http://php
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/frontend:latest
            ghcr.io/${{ steps.meta.outputs.repo }}/frontend:${{ steps.meta.outputs.sha }}

  # ─── Job 2 : déploiement sur le serveur Hetzner ────────────────────────────
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Verifier les secrets SSH
        id: ssh-secrets
        if: ${{ github.event_name == 'pull_request' }}
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          missing=0

          for name in HETZNER_HOST HETZNER_USER HETZNER_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::warning::$name est indisponible pour cette Pull Request."
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verifier SSH production sur Pull Request
        if: ${{ github.event_name == 'pull_request' && steps.ssh-secrets.outputs.available == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/compawgnon
            echo "SSH production OK pour cette Pull Request."

      - name: Ignorer la verification SSH sur Pull Request
        if: ${{ github.event_name == 'pull_request' && steps.ssh-secrets.outputs.available != 'true' }}
        run: |
          echo "Secrets SSH indisponibles sur cet evenement pull_request."
          echo "Le vrai deploiement SSH reste execute apres merge via workflow_run."

      - name: Déployer via SSH
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/compawgnon

            echo ">>> Pull du code..."
            git pull origin master

            echo ">>> Rebuild et redémarrage des conteneurs..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo ">>> Nettoyage des images obsolètes..."
            docker image prune -f

            echo ">>> Déploiement terminé."
